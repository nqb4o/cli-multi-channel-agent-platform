# Prometheus config for the platform LGTM stack (local dev).
#
# Scrapes:
#   - itself (control)
#   - the OTel collector self-metrics (port 8888)
#   - the OTel collector exporter (port 8889) which carries application metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: local
    deployment: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: otel-collector-self
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: otel-collector-app
    static_configs:
      - targets: ["otel-collector:8889"]
