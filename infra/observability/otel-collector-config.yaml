# OpenTelemetry Collector config for the platform's local LGTM stack.
#
# Pipeline overview:
#   traces  : OTLP -> batch -> Tempo (otlphttp)
#   metrics : OTLP -> batch -> Prometheus remote-write
#   logs    : OTLP -> batch -> Loki (otlphttp)

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 5s
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
    spike_limit_mib: 128
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  # Traces -> Tempo (OTLP/HTTP)
  otlphttp/tempo:
    endpoint: http://tempo:4318
    tls:
      insecure: true

  # Metrics -> Prometheus (remote-write)
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
    resource_to_telemetry_conversion:
      enabled: true

  # Logs -> Loki (OTLP/HTTP)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  # Self-observability scrape target.
  prometheus:
    endpoint: 0.0.0.0:8889

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/tempo]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [prometheusremotewrite, prometheus]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [otlphttp/loki]
