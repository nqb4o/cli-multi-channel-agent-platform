# LGTM observability stack for the platform (F14).
#
# Run from repo root:
#   docker compose -f infra/observability/docker-compose.observability.yml up -d
#
# Endpoints once running:
#   Grafana       http://localhost:3000  (admin / admin)
#   Prometheus    http://localhost:9090
#   Tempo         http://localhost:3200  (HTTP)
#   Loki          http://localhost:3100
#   OTLP/HTTP     http://localhost:4318
#   OTLP/gRPC     http://localhost:4317
#
# Point your service at the collector via:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: platform-otel-collector
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Collector self-metrics (Prometheus scrape)
      - "8889:8889"   # Collector-exposed app metrics (Prometheus scrape)
    depends_on:
      - tempo
      - loki
    restart: unless-stopped
    networks:
      - observability

  tempo:
    image: grafana/tempo:2.5.0
    container_name: platform-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP
      - "9095:9095"   # Tempo gRPC
    restart: unless-stopped
    networks:
      - observability

  loki:
    image: grafana/loki:3.1.0
    container_name: platform-loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./loki-config.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/var/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - observability

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: platform-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - observability

  grafana:
    image: grafana/grafana:11.1.0
    container_name: platform-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
      - loki
    restart: unless-stopped
    networks:
      - observability

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:

networks:
  observability:
    driver: bridge
